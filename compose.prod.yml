services:
  web:
    ports: !reset []
  postgres:
    # ports: ["5432:5432"] in compose.yml is a local-dev-only convenience
    # (Task 2) for running tests against Postgres from the host. It must
    # never reach prod: Docker publishes ports via iptables rules that run
    # ahead of ufw, so "ufw allow 22/80/443 only" does NOT protect a
    # docker-published port. Reset it here so postgres is internal-only.
    ports: !reset []
  caddy:
    # Custom build = stock caddy:2 + the cloudflare DNS plugin, needed for the
    # *.beta wildcard cert (DNS-01). Cockpit's own cert flow (HTTP-01,
    # grey-cloud DNS) is unchanged.
    build: ./infra/caddy
    # Least privilege: caddy is the internet-facing container and needs only
    # the domains + the DNS-edit-scoped Cloudflare token — never the full .env
    # (DB password, tokens, broker creds).
    environment:
      COCKPIT_DOMAIN: ${COCKPIT_DOMAIN}
      BETA_DOMAIN: ${BETA_DOMAIN}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    ports: ["80:80", "443:443"]
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on: [web]
    networks:
      - default
      - edge
volumes:
  caddy_data:
networks:
  # Shared with the beta-platform stack (docker network create edge). Lets
  # caddy reach beta-proxy without merging the two compose projects' networks.
  edge:
    external: true
