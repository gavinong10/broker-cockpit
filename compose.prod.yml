services:
  web:
    ports: !reset []
  caddy:
    image: caddy:2
    # Least privilege: caddy is the internet-facing container and needs only
    # the domain — never the full .env (DB password, tokens, broker creds).
    environment:
      COCKPIT_DOMAIN: ${COCKPIT_DOMAIN}
    ports: ["80:80", "443:443"]
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on: [web]
volumes:
  caddy_data:
