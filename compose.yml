services:
  postgres:
    image: postgres:16
    env_file: .env
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      retries: 5
  worker:
    build: apps/worker
    env_file: .env
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      # writable (not :ro): POST /internal/rh/refresh writes the new session pickle
      - ./secrets:/secrets
    depends_on:
      postgres: { condition: service_healthy }
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    env_file: .env
    environment:
      TWS_USERID: ${IB_USER}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE}
      AUTO_RESTART_TIME: "11:59 PM"
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
    restart: unless-stopped
  backup:
    build: infra/backup
    env_file: .env
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      GCS_KEY_FILE: /secrets/gcs-key.json
    volumes:
      - ./secrets/gcs-backup-key.json:/secrets/gcs-key.json:ro
    depends_on: [postgres]
  web:
    build: apps/web
    env_file: .env
    ports: ["3000:3000"]
    volumes:
      # read at request time by /capabilities — new docs appear without a rebuild
      - ./docs/capabilities:/srv/docs/capabilities:ro
    depends_on: [worker]
volumes:
  pgdata:
